<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Free School Portal</title>
    <style>
        * { box-sizing: border-box; font-family: Arial, sans-serif; margin: 0; padding: 0; }
        body { background: #f4f6f9; padding: 20px; color: #333; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; margin-bottom: 20px; color: #2c3e50; }
        label { display: block; margin: 10px 0 5px; font-weight: bold; }
        input, select, button { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; }
        button { background: #3498db; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #2980b9; }
        .hidden { display: none; }
        .card { background: #fdfdfd; border: 1px solid #e0e0e0; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .card h3 { margin-bottom: 5px; color: #2c3e50; }
        .tag { display: inline-block; background: #e8f4fd; color: #3498db; padding: 3px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; margin-bottom: 10px; }
        iframe { width: 100%; height: 200px; border: none; border-radius: 6px; margin-top: 10px; }
        .btn-download { background: #2ecc71; text-decoration: none; display: block; text-align: center; color: white; padding: 10px; border-radius: 6px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <!-- PORTAL LOGIN SCREEN -->
    <div id="login-screen">
        <h2>School Portal Login</h2>
        <label>Select Your Access Role</label>
        <select id="role-select">
            <option value="student">I am a Student</option>
            <option value="teacher">I am a Teacher</option>
        </select>
        
        <label>Enter Secret Access Password</label>
        <input type="password" id="password-input" placeholder="Enter password...">
        <button onclick="handleLogin()">Log Into Portal</button>
    </div>

    <!-- PORTAL TEACHER DASHBOARD -->
    <div id="teacher-screen" class="hidden">
        <h2>Teacher Dashboard</h2>
        <label>Resource Type</label>
        <select id="upload-type">
            <option value="video">Video Lecture (YouTube Link)</option>
            <option value="pdf">Digital Notes / Assignment PDF Link</option>
        </select>

        <label>Subject Name</label>
        <input type="text" id="upload-subject" placeholder="e.g., Physics, Chemistry">

        <label>Lecture Title</label>
        <input type="text" id="upload-title" placeholder="e.g., Chapter 2 Vector Maths">

        <label>Target Student Class</label>
        <select id="upload-class">
            <option value="Class 9">Class 9</option>
            <option value="Class 10">Class 10</option>
            <option value="Class 11">Class 11</option>
        </select>

        <label>Paste Asset Link (YouTube Embed or Drive Link)</label>
        <input type="text" id="upload-link" placeholder="https://...">
        
        <button onclick="uploadData()" style="background: #e74c3c;">Upload Asset Securely</button>
        <button onclick="logout()" style="background: #95a5a6;">Log Out</button>
    </div>

    <!-- PORTAL STUDENT INTERFACE -->
    <div id="student-screen" class="hidden">
        <h2 id="student-welcome">Student Portal Dashboard</h2>
        <div id="lecture-list">Loading class material records...</div>
        <button onclick="logout()" style="background: #95a5a6; margin-top: 20px;">Log Out</button>
    </div>
</div>

<script>
    // Paste your newly generated Apps Script Web App URL right here
    const API_URL = "YOUR_GOOGLE_WEB_APP_URL"; 

    // Local dictionary matching passwords for interface routing
    const LOCAL_PASSWORDS = {
        teacher: "teacher2026",
        class9: "student09",
        class10: "student10",
        class11: "student11"
    };

    let userSessionPassword = "";
    let currentStudentClass = "";

    function handleLogin() {
        const role = document.getElementById('role-select').value;
        const password = document.getElementById('password-input').value;

        if (role === 'teacher' && password === LOCAL_PASSWORDS.teacher) {
            userSessionPassword = password;
            showScreen('teacher-screen');
        } else if (role === 'student') {
            if (password === LOCAL_PASSWORDS.class9) { currentStudentClass = "Class 9"; }
            else if (password === LOCAL_PASSWORDS.class10) { currentStudentClass = "Class 10"; }
            else if (password === LOCAL_PASSWORDS.class11) { currentStudentClass = "Class 11"; }
            
            if (currentStudentClass !== "") {
                userSessionPassword = password;
                showScreen('student-screen');
                document.getElementById('student-welcome').innerText = `Dashboard (${currentStudentClass})`;
                loadStudentContent();
            } else {
                alert("Invalid Student Access Password!");
            }
        } else {
            alert("Invalid Password Entered!");
        }
    }

    function showScreen(screenId) {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('teacher-screen').classList.add('hidden');
        document.getElementById('student-screen').classList.add('hidden');
        document.getElementById(screenId).classList.remove('hidden');
    }

    function logout() {
        document.getElementById('password-input').value = "";
        userSessionPassword = "";
        currentStudentClass = "";
        showScreen('login-screen');
    }

    // Securely push assets straight to Google Sheets with token password verification
    async function uploadData() {
        const type = document.getElementById('upload-type').value;
        const subject = document.getElementById('upload-subject').value;
        const title = document.getElementById('upload-title').value;
        const targetClass = document.getElementById('upload-class').value;
        let link = document.getElementById('upload-link').value;

        if(!subject || !title || !link) return alert("Please fill out all input text items.");

        // Automatically convert share links to inline iframe embeds
        if (link.includes("watch?v=")) {
            link = link.replace("watch?v=", "embed/");
        } else if (link.includes("youtu.be/")) {
            link = link.replace("youtu.be/", "://youtube.com");
        }

        const payload = { 
            authPass: userSessionPassword, // Passes the secure teacher token
            id: Date.now(), 
            type: type, 
            subject: subject, 
            title: title, 
            class: targetClass, 
            link: link 
        };

        try {
            await fetch(API_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            alert("Success! Material uploaded straight to Google Sheet database.");
            document.getElementById('upload-subject').value = "";
            document.getElementById('upload-title').value = "";
            document.getElementById('upload-link').value = "";
        } catch (error) {
            alert("Network submission error.");
        }
    }

    // Pull filtered dataset from database verified securely by password
    async function loadStudentContent() {
        const listContainer = document.getElementById('lecture-list');
        listContainer.innerHTML = "Opening secure link stream...";

        try {
            // Passes session password to query endpoint securely
            let response = await fetch(`${API_URL}?pass=${userSessionPassword}`);
            let data = await response.json();

            listContainer.innerHTML = "";
            if (!data || data.length === 0) {
                listContainer.innerHTML = "<p>No study updates published for your class room yet.</p>";
                return;
            }

            data.reverse().forEach(item => {
                const card = document.createElement('div');
                card.className = "card";
                card.innerHTML = `
                    <span class="tag">${item.subject.toUpperCase()}</span>
                    <h3>${item.title}</h3>
                `;

                if (item.type === 'video') {
                    card.innerHTML += `<iframe src="${item.link}" allowfullscreen></iframe>`;
                } else if (item.type === 'pdf') {
                    card.innerHTML += `<a href="${item.link}" target="_blank" class="btn-download">📥 Open PDF Resources / Homework</a>`;
                }
                listContainer.appendChild(card);
            });
        } catch (error) {
            listContainer.innerHTML = "<p style='color:red;'>Error updating feed stream elements.</p>";
        }
    }
</script>
</body>
</html>
