<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Campus ERP - Secure Access</title>
    <style>
        :root {
            --primary: #2563eb;
            --success: #16a34a;
            --danger: #dc2626;
            --background: #f8fafc;
            --dark: #1e293b;
            --gray: #64748b;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background);
            color: var(--dark);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        h1, h2, h3 {
            text-align: center;
            color: var(--primary);
        }
        .school-header {
            text-align: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 3px double var(--primary);
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            box-sizing: border-box;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary { background-color: var(--primary); color: white; width: 100%; }
        .btn-success { background-color: var(--success); color: white; }
        .btn-danger { background-color: var(--danger); color: white; }
        .btn-logout { background-color: #64748b; color: white; padding: 6px 12px; font-size: 14px; float: right; }
        
        button:hover { opacity: 0.9; }
        
        .panel { display: none; }
        .active { display: block; }

        .login-box {
            max-width: 400px;
            margin: 40px auto;
            padding: 20px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: #ffffff;
        }
        .student-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
        }
        .nav-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid #cbd5e1;
            padding-bottom: 10px;
        }
        .tab-btn {
            background: #e2e8f0;
            color: var(--dark);
            padding: 8px 16px;
            font-size: 14px;
        }
        .tab-btn.active-tab {
            background: var(--primary);
            color: white;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Dynamic School Name Header Set By Teacher -->
    <div class="school-header">
        <h1 id="displaySchoolName">🏫 Global Public School</h1>
        <p style="color: var(--gray); margin: 5px 0;">Campus Management ERP System</p>
    </div>

    <!-- 1. LOGIN PANEL -->
    <div id="loginPanel" class="panel active">
        <div class="login-box">
            <h3>Secure Gateway Login</h3>
            <div class="form-group">
                <label>Select User Role</label>
                <select id="loginRole">
                    <option value="teacher">Teacher / Administrator</option>
                    <option value="student">Student Portal</option>
                </select>
            </div>
            <div class="form-group">
                <label>User ID / Roll Number</label>
                <input type="text" id="loginId" placeholder="Enter ID (e.g., admin or 101)">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="Enter Password">
            </div>
            <button class="btn-primary" onclick="handleLogin()">Access Dashboard</button>
        </div>
    </div>

    <!-- 2. TEACHER PORTAL -->
    <div id="teacherPortal" class="panel">
        <button class="btn-logout" onclick="handleLogout()">Logout</button>
        <h2>👩‍🏫 Teacher Control Center</h2>
        
        <!-- Teacher Sub-Navigation tabs for layout management -->
        <div class="nav-tabs">
            <button class="tab-btn active-tab" onclick="switchTeacherTab('attendance')">Attendance</button>
            <button class="tab-btn" onclick="switchTeacherTab('passwords')">Manage Passwords</button>
            <button class="tab-btn" onclick="switchTeacherTab('settings')">School Settings</button>
        </div>

        <!-- Tab A: Attendance Panel -->
        <div id="tabAttendance" class="teacher-tab-content">
            <h3>Daily Class Attendance</h3>
            <div id="attendanceList"></div>
            <div style="text-align: center; margin-top: 15px;">
                <button class="btn-success" onclick="alert('Attendance Saved!')">Submit Records</button>
            </div>
        </div>

        <!-- Tab B: Password Manager (Teacher sets student passwords here) -->
        <div id="tabPasswords" class="teacher-tab-content" style="display:none;">
            <h3>🔑 Student Password & Account Manager</h3>
            <div id="passwordManagerList"></div>
        </div>

        <!-- Tab C: Custom School Name Settings -->
        <div id="tabSettings" class="teacher-tab-content" style="display:none;">
            <h3>⚙️ Customise Branding</h3>
            <div class="form-group">
                <label>Change School Name:</label>
                <input type="text" id="inputSchoolName" value="Global Public School">
            </div>
            <button class="btn-success" onclick="updateSchoolName()">Save New Branding Name</button>
        </div>
    </div>

    <!-- 3. STUDENT PORTAL -->
    <div id="studentPortal" class="panel">
        <button class="btn-logout" onclick="handleLogout()">Logout</button>
        <h2>👨‍🎓 Student Portal</h2>
        <div class="student-row">
            <strong>Welcome back:</strong>
            <span id="profileName">-</span>
        </div>
        <div class="student-row">
            <strong>Roll Number:</strong>
            <span id="profileId">-</span>
        </div>
        <div class="student-row">
            <strong>Today's Attendance Status:</strong>
            <span id="profileStatus">-</span>
        </div>
    </div>
</div>

<script>
    // ERP Core App Database Memory Space
    let currentSchoolName = "Global Public School";
    let loggedInUser = null;

    // Student accounts database showing passwords set by default or by teacher
    let studentDatabase = [
        { id: "101", name: "Rahul Sharma", password: "user123", status: "Not Marked" },
        { id: "102", name: "Priya Patel", password: "user456", status: "Not Marked" }
    ];

    // Login Verification Access Logic
    function handleLogin() {
        const role = document.getElementById('loginRole').value;
        const idInput = document.getElementById('loginId').value.trim();
        const passwordInput = document.getElementById('loginPassword').value;

        if (role === 'teacher') {
            // Hardcoded developer/teacher credential check
            if (idInput === 'admin' && passwordInput === 'admin123') {
                showPanel('teacherPortal');
                renderTeacherAttendance();
                renderPasswordManager();
            } else {
                alert("Invalid Teacher ID or Password! (Hint: Use ID 'admin' and Password 'admin123')");
            }
        } else if (role === 'student') {
            // Find student inside matching records array
            let student = studentDatabase.find(s => s.id === idInput);
            
            if (student && student.password === passwordInput) {
                loggedInUser = student;
                showPanel('studentPortal');
                renderStudentProfile();
            } else {
                alert("Invalid Roll Number or Student Password!");
            }
        }
    }

    // Logout cleanup routine
    function handleLogout() {
        loggedInUser = null;
        document.getElementById('loginId').value = "";
        document.getElementById('loginPassword').value = "";
        showPanel('loginPanel');
    }

    // Screen navigation helper functions
    function showPanel(panelId) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.getElementById(panelId).classList.add('active');
    }

    function switchTeacherTab(tabName) {
        document.querySelectorAll('.teacher-tab-content').forEach(el => el.style.display = 'none');
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active-tab'));
        
        if(tabName === 'attendance') {
            document.getElementById('tabAttendance').style.display = 'block';
        } else if(tabName === 'passwords') {
            document.getElementById('tabPasswords').style.display = 'block';
        } else if(tabName === 'settings') {
            document.getElementById('tabSettings').style.display = 'block';
        }
        event.target.classList.add('active-tab');
    }

    // Custom school branding updater tool
    function updateSchoolName() {
        const newName = document.getElementById('inputSchoolName').value.trim();
        if(newName !== "") {
            currentSchoolName = newName;
            document.getElementById('displaySchoolName').innerText = "🏫 " + newName;
